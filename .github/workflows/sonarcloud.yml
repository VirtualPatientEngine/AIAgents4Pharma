# SonarCloud code quality analysis workflow
name: SonarCloud Analysis

on:
  pull_request:
    branches: [main]
    paths:
      - "aiagents4pharma/**"
      - "pyproject.toml"
      - "uv.lock"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  push:
    branches: [main]
    paths:
      - "aiagents4pharma/**"
      - "pyproject.toml"
      - "uv.lock"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  workflow_dispatch:

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
  ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Generate SonarCloud reports
        shell: bash
        run: |
          set -euo pipefail

          modules=(
            talk2aiagents4pharma
            talk2biomodels
            talk2cells
            talk2knowledgegraphs
            talk2scholars
          )

          for module in "${modules[@]}"; do
            src="aiagents4pharma/${module}"
            tests="${src}/tests"

            uv run bandit -c pyproject.toml -r "${src}" -f json -o "bandit-${module}.json" || true
            uv run pylint "${src}" --output-format=json --reports=no > "pylint-${module}.json" || true

            if [ -d "${tests}" ]; then
              uv run coverage run \
                --data-file=".coverage.${module}" \
                --include="${src}/*" \
                -m pytest --cache-clear "${tests}"
              uv run coverage xml \
                --data-file=".coverage.${module}" \
                -o "coverage-${module}.xml"
            fi
          done

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
