name: Docker Build and Push

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to build, for example v1.48.2"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: talk2aiagents4pharma
            dockerfile: aiagents4pharma/talk2aiagents4pharma/Dockerfile
            suffix: ""
            latest_tag: latest
            install_cuda: "true"
          - image: talk2aiagents4pharma
            dockerfile: aiagents4pharma/talk2aiagents4pharma/Dockerfile
            suffix: "-cpu"
            latest_tag: latest-cpu
            install_cuda: "false"
          - image: talk2biomodels
            dockerfile: aiagents4pharma/talk2biomodels/Dockerfile
            suffix: ""
            latest_tag: latest
            install_cuda: "false"
          - image: talk2scholars
            dockerfile: aiagents4pharma/talk2scholars/Dockerfile
            suffix: ""
            latest_tag: latest
            install_cuda: "false"
          - image: talk2knowledgegraphs
            dockerfile: aiagents4pharma/talk2knowledgegraphs/Dockerfile
            suffix: ""
            latest_tag: latest
            install_cuda: "true"
          - image: talk2knowledgegraphs
            dockerfile: aiagents4pharma/talk2knowledgegraphs/Dockerfile
            suffix: "-cpu"
            latest_tag: latest-cpu
            install_cuda: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache || true
          sudo apt-get clean || true
          sudo apt-get autoremove -y || true
          sudo docker system prune -af || true
          sudo docker builder prune -af || true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            vpatientengine/${{ matrix.image }}:${{ steps.version.outputs.version }}${{ matrix.suffix }}
            vpatientengine/${{ matrix.image }}:${{ matrix.latest_tag }}
          build-args: |
            INSTALL_CUDA=${{ matrix.install_cuda }}
